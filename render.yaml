services:
  - type: web
    name: paradise-rpg-server
    env: node
    rootDir: server
    buildCommand: npm ci
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: WS_MODE
        value: shared
      - key: WS_PATH
        value: /ws
      - key: DB_SSL
        value: true
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: paradise-rpg-db
          property: connectionString

databases:
  - name: paradise-rpg-db
    databaseName: paradise_rpg
    user: paradise_rpg
