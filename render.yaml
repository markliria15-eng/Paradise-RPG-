services:
  - type: web
    name: paradise-rpg-server
    env: node
    rootDir: server
    buildCommand: npm ci
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: WS_MODE
        value: shared
      - key: WS_PATH
        value: /ws
      - key: DB_SSL
        value: "true"
      - key: DB_CONNECTION_TIMEOUT_MS
        value: "20000"
      - key: DB_MIGRATE_ATTEMPTS
        value: "8"
      - key: DB_MIGRATE_RETRY_DELAY_MS
        value: "5000"
      - key: DB_STARTUP_ATTEMPTS
        value: "8"
      - key: DB_STARTUP_RETRY_DELAY_MS
        value: "4000"
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: "*"
      - key: ANDROID_APK_URL
        value: https://github.com/markliria15-eng/Paradise-RPG-/releases/download/v0.1.5/paradise-rpg-android-v0.1.5.apk
      - key: DATABASE_URL
        fromDatabase:
          name: paradise-rpg-db
          property: connectionString

databases:
  - name: paradise-rpg-db
    databaseName: paradise_rpg
    user: paradise_rpg
