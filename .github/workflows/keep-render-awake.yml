name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Paradise RPG server
        run: |
          curl --fail --silent --show-error --max-time 20 https://paradise-rpg-server.onrender.com/health
          curl --fail --silent --show-error --max-time 20 https://paradise-rpg-server.onrender.com/world/status
