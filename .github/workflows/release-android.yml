name: Publish Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.6"
        required: true
        default: "v0.1.6"

permissions:
  contents: write

jobs:
  release-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          mkdir -p "${HOME}/.android"
          keytool -genkeypair -v \
            -keystore "${HOME}/.android/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Install Godot 4.2.2 and export templates
        shell: bash
        run: |
          set -euo pipefail
          GODOT_VERSION="4.2.2"
          GODOT_CHANNEL="stable"
          GODOT_FULL="${GODOT_VERSION}-${GODOT_CHANNEL}"
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${GODOT_FULL}/Godot_v${GODOT_FULL}_linux.x86_64.zip"
          TEMPLATES_URL="https://github.com/godotengine/godot/releases/download/${GODOT_FULL}/Godot_v${GODOT_FULL}_export_templates.tpz"

          mkdir -p .ci/godot
          curl -L "${GODOT_URL}" -o .ci/godot/godot.zip
          unzip -q .ci/godot/godot.zip -d .ci/godot
          mv .ci/godot/Godot_v${GODOT_FULL}_linux.x86_64 .ci/godot/godot
          chmod +x .ci/godot/godot

          curl -L "${TEMPLATES_URL}" -o .ci/godot/templates.tpz
          unzip -q .ci/godot/templates.tpz -d .ci/godot/templates
          mkdir -p "${HOME}/.local/share/godot/export_templates/4.2.2.stable"
          cp .ci/godot/templates/templates/* "${HOME}/.local/share/godot/export_templates/4.2.2.stable/"

      - name: Configure Godot Android export
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi
          VERSION_NAME="${TAG#v}"
          VERSION_CODE="$(python - "${VERSION_NAME}" <<'PY'
          import re
          import sys
          parts = [int(p) for p in re.findall(r"\d+", sys.argv[1])[:3]]
          while len(parts) < 3:
              parts.append(0)
          print(parts[0] * 10000 + parts[1] * 100 + parts[2])
          PY
          )"
          export VERSION_NAME VERSION_CODE

          mkdir -p "${HOME}/.config/godot"
          cat > "${HOME}/.config/godot/editor_settings-4.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/debug_keystore = "${HOME}/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

          python - <<'PY'
          from pathlib import Path
          import os

          preset = Path("export_presets.cfg")
          text = preset.read_text(encoding="utf-8")
          key = str(Path("ci/android/paradise-release.keystore").resolve()).replace("\\", "/")
          debug_key = str(Path.home() / ".android" / "debug.keystore").replace("\\", "/")
          text = text.replace('keystore/debug="C:/Users/markl/.android/debug.keystore"', f'keystore/debug="{debug_key}"')
          text = text.replace('keystore/release="C:/Users/markl/Documents/Codex/2026-05-27/1-ideia-central-do-jogo-o/build/android/arcadia-release.keystore"', f'keystore/release="{key}"')
          text = text.replace('version/code=1', f'version/code={os.environ["VERSION_CODE"]}')
          text = text.replace('version/name="1.0.0"', f'version/name="{os.environ["VERSION_NAME"]}"')
          preset.write_text(text, encoding="utf-8")
          PY

      - name: Export full Android APK
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi

          mkdir -p build/android
          mkdir -p release-assets
          .ci/godot/godot --headless --path . --export-release "Android" "release-assets/paradise-rpg-android-${TAG}.apk"
          "${ANDROID_HOME}/build-tools/35.0.0/apksigner" verify --verbose "release-assets/paradise-rpg-android-${TAG}.apk"
          sha256sum "release-assets/paradise-rpg-android-${TAG}.apk" > "release-assets/paradise-rpg-android-${TAG}.sha256.txt"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: Paradise RPG Beta ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          body: |
            Paradise RPG Android beta.

            Este APK conecta ao servidor online do Render:
            https://paradise-rpg-server.onrender.com

            WebSocket:
            wss://paradise-rpg-server.onrender.com/ws
          files: |
            release-assets/*.apk
            release-assets/*.sha256.txt
